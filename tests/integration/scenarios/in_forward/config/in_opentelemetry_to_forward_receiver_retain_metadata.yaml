service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: opentelemetry
      port: ${FLUENT_BIT_TEST_LISTENER_PORT}
      http2: off
      tls: off
      profiles_support: true

  outputs:
    - name: forward
      match: '*'
      host: 127.0.0.1
      port: ${FORWARD_RECEIVER_PORT}
      send_options: true
      retain_metadata_in_forward_mode: true
      require_ack_response: true
