service:
  flush: 1
  grace: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: forward
      listen: 127.0.0.1
      port: ${FLUENT_BIT_TEST_LISTENER_PORT}

  outputs:
    - name: forward
      match: test
      host: 127.0.0.1
      port: ${FORWARD_RECEIVER_PORT}
      send_options: true
      require_ack_response: true
      retain_metadata_in_forward_mode: true
      compress: gzip
