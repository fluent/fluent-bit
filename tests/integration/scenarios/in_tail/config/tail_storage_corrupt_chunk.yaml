service:
  flush: 60
  grace: 1
  log_level: debug
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}
  storage.path: ${TAIL_STORAGE_PATH}
  storage.sync: normal
  storage.checksum: on
  storage.delete_irrecoverable_chunks: on
  storage.max_chunks_up: 128

pipeline:
  inputs:
    - name: tail
      tag: tail.storage
      path: ${TAIL_TEST_PATH}
      read_from_head: true
      read_newly_discovered_files_from_head: true
      refresh_interval: 1
      watcher_interval: 1
      progress_check_interval: 1
      db: ${TAIL_TEST_DB}
      db.sync: full
      db.journal_mode: DELETE
      storage.type: filesystem

  outputs:
    - name: http
      match: tail.storage
      host: 127.0.0.1
      port: ${TAIL_STORAGE_OUTPUT_PORT}
      uri: /data
      format: json
      json_date_key: false
      retry_limit: false
