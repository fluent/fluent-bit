service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: elasticsearch
      listen: 0.0.0.0
      port: ${FLUENT_BIT_TEST_LISTENER_PORT}
      http2: off
      tls: off
      buffer_max_size: 112
      buffer_chunk_size: 112

  outputs:
    - name: stdout
      match: '*'
