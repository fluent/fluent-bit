service:
  flush: 1
  grace: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}
  parsers_file: ${PARSERS_FILE_TEST}

pipeline:
  inputs:
    - name: syslog
      tag: target_input
      path: ${SYSLOG_SOCKET_PATH}
      mode: unix_tcp
      parser: syslog-rfc3164-local

  outputs:
    - name: http
      match: target_input
      host: 127.0.0.1
      port: ${TEST_SUITE_HTTP_PORT}
      uri: /data
      format: json
