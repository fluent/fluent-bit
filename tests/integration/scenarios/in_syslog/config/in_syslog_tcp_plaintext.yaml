service:
  flush: 1
  grace: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}
  parsers_file: ${PARSERS_FILE_TEST}

pipeline:
  inputs:
    - name: syslog
      tag: target_input
      listen: 127.0.0.1
      port: ${FLUENT_BIT_TEST_LISTENER_PORT}
      mode: tcp
      parser: syslog-rfc5424

  outputs:
    - name: http
      match: target_input
      host: 127.0.0.1
      port: ${TEST_SUITE_HTTP_PORT}
      uri: /data
      format: json
