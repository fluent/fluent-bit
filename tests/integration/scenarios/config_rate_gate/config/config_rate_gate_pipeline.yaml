service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: dummy
      tag: rate_gate.test
      dummy: '{"message":"hello from config_rate_gate integration"}'
      rate: 120
      rate_gate: true
      rate_gate.max_bytes: 512
      rate_gate.max_records: 10
      rate_window: 1s
      rate_gate.backpressure: true

  outputs:
    - name: stdout
      match: "*"
