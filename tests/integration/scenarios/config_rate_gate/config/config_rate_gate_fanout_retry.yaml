service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: dummy
      tag: rate_gate.fanout
      dummy: '{"message":"fanout retry"}'
      rate: 250
      rate_gate: true
      rate_gate.max_bytes: 512
      rate_gate.max_records: 15
      rate_window: 1s
      rate_gate.backpressure: true

  outputs:
    - name: stdout
      match: rate_gate.fanout

    - name: http
      match: rate_gate.fanout
      host: 127.0.0.1
      port: ${TEST_SUITE_HTTP_PORT}
      uri: /data
      format: json
      json_date_key: false
      retry_limit: 2
