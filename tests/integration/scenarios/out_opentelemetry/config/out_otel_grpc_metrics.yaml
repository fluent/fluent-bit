service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: fluentbit_metrics
      scrape_interval: 1
      scrape_on_start: on

  outputs:
    - name: opentelemetry
      match: "*"
      host: 127.0.0.1
      port: ${TEST_SUITE_HTTP_PORT}
      http2: on
      grpc: on
      grpc_metrics_uri: /custom.metrics.v1.Metrics/Push
      header: "x-metrics grpc"
