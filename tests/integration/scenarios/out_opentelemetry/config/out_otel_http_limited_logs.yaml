service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: opentelemetry
      port: ${FLUENT_BIT_TEST_LISTENER_PORT}
      http2: off
      tls: off

  outputs:
    - name: opentelemetry
      match: "*"
      host: 127.0.0.1
      port: ${TEST_SUITE_HTTP_PORT}
      logs_uri: /limited/logs
      logs_max_resources: 1
      logs_max_scopes: 1
