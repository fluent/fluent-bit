service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: dummy
      samples: 1
      dummy: |
        {
          "message": "hello over tls"
        }

  outputs:
    - name: opentelemetry
      match: "*"
      host: localhost
      port: ${TEST_SUITE_HTTP_PORT}
      tls: on
      tls.verify: on
      tls.verify_hostname: on
      tls.vhost: localhost
      tls.ca_file: ${CERTIFICATE_TEST}
