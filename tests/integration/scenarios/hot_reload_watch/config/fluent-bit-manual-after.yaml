service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}
  hot_reload: on

pipeline:
  inputs:
    - name: dummy
      samples: 1
      dummy: |
        {
          "message": "after"
        }

  outputs:
    - name: opentelemetry
      match: "*"
      host: 127.0.0.1
      port: ${TEST_SUITE_HTTP_PORT}
      logs_uri: /v1/logs
      logs_body_key: $message
