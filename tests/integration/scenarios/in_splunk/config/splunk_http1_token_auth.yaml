service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}
pipeline:
  inputs:
    - name: splunk
      port: ${FLUENT_BIT_TEST_LISTENER_PORT}
      host: 0.0.0.0
      http2: off
      net.keepalive: on
      tls: off
      splunk_token: 11111111-1111-1111-1111-111111111111
  outputs:
    - name: stdout
      match: '*'
