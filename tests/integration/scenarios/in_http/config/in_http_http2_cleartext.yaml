service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: http
      port: ${FLUENT_BIT_TEST_LISTENER_PORT}
      http2: on
      tls: off

  outputs:
    - name: http
      match: '*'
      host: 127.0.0.1
      port: ${TEST_SUITE_HTTP_PORT}
      uri: /data
      format: json
