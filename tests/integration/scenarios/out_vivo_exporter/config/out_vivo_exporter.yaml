service:
  flush: 1
  grace: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: dummy
      tag: dummy.logs
      dummy: '{"message":"vivo"}'
      samples: 1

    - name: fluentbit_metrics
      scrape_interval: 1
      scrape_on_start: true

  outputs:
    - name: vivo_exporter
      match: "*"
      host: 127.0.0.1
      port: ${EXPORTER_PORT}
      http_cors_allow_origin: "*"
