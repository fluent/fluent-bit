service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: dummy
      tag: out_http_tls
      dummy: '{"message":"hello over tls timeout","source":"dummy"}'
      samples: 1

  outputs:
    - name: http
      match: out_http_tls
      host: localhost
      port: ${TEST_SUITE_HTTP_PORT}
      uri: /data
      format: json
      json_date_key: false
      retry_limit: 1
      http.response_timeout: 10s
      http.read_idle_timeout: 2s
      tls: on
      tls.verify: on
      tls.verify_hostname: on
      tls.vhost: localhost
      tls.ca_file: ${CERTIFICATE_TEST}
