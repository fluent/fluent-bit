service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: dummy
      tag: out_http_chunked_read_idle_timeout
      dummy: '{"message":"retry chunked response","source":"dummy"}'
      samples: 1

  outputs:
    - name: http
      match: out_http_chunked_read_idle_timeout
      host: 127.0.0.1
      port: ${TEST_SUITE_HTTP_PORT}
      uri: /data
      format: json
      json_date_key: false
      http.response_timeout: 10s
      http.read_idle_timeout: 2s
      retry_limit: 1
