service:
  flush: 1
  grace: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}
  telemetry:
    metrics:
      logs:
        tag_records:
          enabled: true
          max_series: 1

pipeline:
  inputs:
    - name: dummy
      alias: tag_records_first
      tag: tag.records.first
      dummy: '{"message":"first"}'
      samples: 1
    - name: dummy
      alias: tag_records_second
      tag: tag.records.second
      dummy: '{"message":"second"}'
      samples: 1

  outputs:
    - name: stdout
      match: '*'
