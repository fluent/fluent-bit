service:
  flush: 1
  grace: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}
  telemetry:
    metrics:
      logs:
        tag_records:
          enabled: true

pipeline:
  inputs:
    - name: dummy
      alias: tag_records_input_disabled
      tag: tag.records.input.disabled
      telemetry:
        metrics:
          logs:
            tag_records:
              enabled: false
      dummy: '{"message":"input disabled"}'
      samples: 1

  outputs:
    - name: stdout
      match: '*'
