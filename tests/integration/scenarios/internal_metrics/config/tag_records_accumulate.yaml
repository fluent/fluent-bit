service:
  flush: 1
  grace: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}
  telemetry:
    metrics:
      logs:
        tag_records:
          enabled: true

pipeline:
  inputs:
    - name: dummy
      alias: tag_records_accumulate
      tag: tag.records.acc
      dummy: '{"message":"acc"}'
      interval_sec: 0
      interval_nsec: 100000000

  outputs:
    - name: stdout
      match: '*'
