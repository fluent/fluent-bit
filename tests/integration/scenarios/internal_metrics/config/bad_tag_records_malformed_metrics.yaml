service:
  flush: 1
  grace: 1
  log_level: error
  # 'metrics' must be a map; a scalar here is a malformed telemetry block
  telemetry:
    metrics: true

pipeline:
  inputs:
    - name: dummy
      tag: bad.metrics
      dummy: '{"message":"x"}'
      samples: 1

  outputs:
    - name: 'null'
      match: '*'
