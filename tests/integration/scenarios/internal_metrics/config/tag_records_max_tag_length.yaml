service:
  flush: 1
  grace: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}
  telemetry:
    metrics:
      logs:
        tag_records:
          enabled: true
          max_tag_length: 4

pipeline:
  inputs:
    - name: dummy
      alias: tag_records_long_tag
      tag: tag.records.too.long
      dummy: '{"message":"long tag"}'
      samples: 1

  outputs:
    - name: stdout
      match: '*'
