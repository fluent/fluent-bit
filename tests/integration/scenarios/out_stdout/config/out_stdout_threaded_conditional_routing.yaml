service:
  flush: 1
  grace: 1
  log_level: trace
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: dummy
      alias: filler_dummy
      tag: filler
      dummy: '{"message":"filler"}'
      samples: 1

    - name: dummy
      alias: threaded_routed_dummy
      threaded: true
      tag: threaded.base
      dummy: '{"message":"threaded conditional match"}'
      samples: 1
      processors:
        logs:
          - name: content_modifier
            action: insert
            key: topic
            value: topic1
      routes:
        logs:
          - name: threaded_topic1
            condition:
              op: and
              rules:
                - field: $topic
                  op: eq
                  value: topic1
            to:
              outputs:
                - stdout1

  outputs:
    - name: stdout
      alias: stdout1
