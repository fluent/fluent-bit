service:
  flush: 1
  grace: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: dummy
      tag: stdout.json
      dummy: '{"message":"hello json lines","source":"dummy"}'
      samples: 1

  outputs:
    - name: stdout
      match: '*'
      format: json_lines
      json_date_key: timestamp
      json_date_format: iso8601
