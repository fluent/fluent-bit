service:
  flush: 1
  grace: 1
  log_level: trace
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: dummy
      alias: dummy1
      tag: firstdummy
      dummy: '{"message":"custom dummy one"}'
      samples: 1

    - name: dummy
      alias: dummy2
      tag: seconddummy
      dummy: '{"message":"custom dummy two"}'
      samples: 1

    - name: dummy
      alias: routed_dummy
      tag: somethingdiff
      dummy: '{"message":"custom dummy"}'
      samples: 1
      processors:
        logs:
          - name: content_modifier
            action: insert
            key: topic
            value: topic1
      routes:
        logs:
          - name: topic1
            condition:
              op: and
              rules:
                - field: $topic
                  op: eq
                  value: topic1
            to:
              outputs:
                - stdout1

  outputs:
    - name: stdout
      alias: stdout1
