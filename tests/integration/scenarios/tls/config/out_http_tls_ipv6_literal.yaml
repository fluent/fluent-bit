service:
  flush: 1
  log_level: info
  http_server: on
  http_port: ${FLUENT_BIT_HTTP_MONITORING_PORT}

pipeline:
  inputs:
    - name: dummy
      tag: tls_sni
      dummy: '{"message":"hello over tls","source":"dummy"}'
      samples: 1

  outputs:
    - name: http
      match: tls_sni
      host: "::1"
      port: ${TEST_SUITE_HTTP_PORT}
      uri: /data
      format: json
      json_date_key: false
      retry_limit: 1
      tls: on
      tls.verify: off
