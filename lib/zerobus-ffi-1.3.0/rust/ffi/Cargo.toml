[package]
name = "zerobus-ffi"
version = "1.3.0"
edition = "2021"
description = "C FFI bindings for the Zerobus Rust SDK"
license = "Apache-2.0"
publish = false

[lib]
crate-type = ["staticlib", "cdylib"]

[dependencies]
databricks-zerobus-ingest-sdk = { path = "../sdk", version = "2.0.1", features = ["arrow-flight", "testing"] }

# Arrow IPC for serializing/deserializing RecordBatches across the FFI boundary
arrow-ipc.workspace = true

# FFI helpers
tokio = { workspace = true, features = ["rt", "rt-multi-thread"] }
once_cell.workspace = true
prost.workspace = true
prost-types.workspace = true
async-trait.workspace = true
bytes.workspace = true
libc.workspace = true

# Dynamic protobuf: build a descriptor pool from a UC-derived DescriptorProto
# and encode JSON records into protobuf bytes (UC schema -> proto path for
# pure-C consumers). serde_json parses the UC table metadata + record JSON.
prost-reflect = { workspace = true, features = ["serde"] }
serde_json.workspace = true

# Logging
tracing-subscriber = { workspace = true, features = ["fmt"] }

[build-dependencies]
cbindgen.workspace = true
