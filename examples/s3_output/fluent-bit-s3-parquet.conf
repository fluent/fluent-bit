# ============================================
# Case 1: Low Traffic + PutObject API (Small Files)
# Upload Strategy: Time-based trigger for low-frequency logs
#   - upload_timeout: 5m (upload every 5 minutes, default is 10m)
#   - total_file_size: 3M (small file, triggers PutObject API)
#   - use_put_object: true (single request upload for files < 10MB)
# Use Case: Application logs, audit logs, low-frequency events
#
# NOTE: Default upload_timeout is 10m if not specified.
#       Set shorter timeout for faster uploads (e.g., 5m for testing)
#       Set longer timeout to accumulate larger files (e.g., 60m for production)
# ============================================
[OUTPUT]
    Name                s3
    Match               app.logs
    bucket              s3-bucket-kafka-sink
    region              ap-northeast-1
    s3_key_format       /fluent-bit-logs/putobject/app/day=%Y%m%d/%Y%m%d-%H%M%S.json.gz
    static_file_path    true
    total_file_size     3M
    upload_timeout      5m
    format              json
    compression         gzip
    use_put_object      true
    store_dir           /tmp/fluent-bit-test/app-logs
    store_dir_limit_size 50M

# ============================================
# Case 2: High Traffic + Multipart Upload (Large Files)
# Upload Strategy: Size-based trigger with hourly fallback
#   - upload_timeout: 60m (hourly archival as fallback, default is 10m)
#   - total_file_size: 50M (large file, triggers multipart upload)
#   - upload_chunk_size: 10M (each part is 10MB)
#   - use_put_object: false (uses S3 Multipart Upload API)
# Use Case: Access logs, high-volume metrics, streaming data
#
# NOTE: Default upload_timeout is 10m if not specified.
#       For high-traffic scenarios, use longer timeout (60m) to create larger files
#       Larger files = better compression ratio and lower S3 API costs
# Note: Multipart Upload splits large files into chunks for efficient transfer
# ============================================
[OUTPUT]
    Name                s3
    Match               access.logs
    bucket              s3-bucket-kafka-sink
    region              ap-northeast-1
    s3_key_format       /fluent-bit-logs/multipart/access/day=%Y%m%d/%Y%m%d-%H%M%S.parquet
    static_file_path    true
    total_file_size     50M
    upload_chunk_size   10M
    upload_timeout      60m
    format              parquet
    compression         gzip
    schema_str          {"fields":[{"name":"timestamp","type":"int64","nullable":false},{"name":"level","type":"utf8","nullable":false},{"name":"message","type":"utf8","nullable":false},{"name":"method","type":"utf8","nullable":true},{"name":"path","type":"utf8","nullable":true},{"name":"status","type":"int64","nullable":true},{"name":"duration_ms","type":"float64","nullable":true},{"name":"client_ip","type":"utf8","nullable":true},{"name":"user_agent","type":"utf8","nullable":true}]}
    use_put_object      false
    store_dir           /tmp/fluent-bit-test/access-logs
    store_dir_limit_size 200M
