name: Build images for all architectures
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - 'dockerfiles/Dockerfile'
      - 'dockerfiles/Dockerfile.windows'
      - 'conf/**'

  workflow_dispatch:

jobs:
    pr-image-tests-build-images:
      name: PR - Buildkit docker build test
      runs-on: ubuntu-latest
      permissions:
        contents: read
        # We do not push and this allows simpler workflow running for forks too
      steps:
        - name: Checkout code
          uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
          with:
            persist-credentials: false

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

        - name: Extract metadata from Github
          id: meta
          uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
          with:
            images: ${{ github.repository }}/pr-${{ github.event.pull_request.number }}
            tags: |
              type=sha

        - name: Build the multi-arch images
          id: build
          uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
          with:
            file: ./dockerfiles/Dockerfile
            context: .
            platforms: linux/amd64
            target: production
            provenance: false
            push: false
            load: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}

        - name: Sanity check it runs
          # We do this for a simple check of dependencies
          run: |
            docker run --rm -t ${{ steps.meta.outputs.tags }} --help
          shell: bash

        - name: Build the debug multi-arch images
          uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
          with:
            file: ./dockerfiles/Dockerfile
            context: .
            platforms: linux/amd64
            target: debug
            provenance: false
            push: false
            load: false

    pr-image-tests-classic-docker-build:
      name: PR - Classic docker build test
      runs-on: ubuntu-latest
      permissions:
        contents: read
      steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build the classic test image
        # We only want to confirm it builds with classic mode, nothing else
        run: |
          docker build -f ./dockerfiles/Dockerfile .
        env:
          # Ensure we disable buildkit
          DOCKER_BUILDKIT: 0
        shell: bash
    pr-image-tests-build-windows-images:
      name: PR - Docker windows build test, windows 2022 and 2025
      runs-on: windows-${{ matrix.windows-base-version }}
      strategy:
        fail-fast: true
        matrix:
          windows-base-version:
            # https://github.com/fluent/fluent-bit/blob/1d366594a889624ec3003819fe18588aac3f17cd/dockerfiles/Dockerfile.windows#L3
            - '2022'
            - '2025'
      permissions:
        contents: read
      steps:
        - name: Checkout repository
          uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

        - name: Extract metadata from Github
          id: meta
          uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
          with:
            images: ${{ github.repository }}/pr-${{ github.event.pull_request.number }}
            tags: |
              type=sha
            flavor: |
              suffix=-windows-${{ matrix.windows-base-version }}

        # https://github.com/actions/runner-images/issues/12199
        # https://github.com/moby/moby/issues/48093
        # https://support.microsoft.com/en-us/topic/gettemppath-changes-in-windows-february-cumulative-update-preview-4cc631fb-9d97-4118-ab6d-f643cd0a7259#ID0EDF
        - name: Change system temp directory to the drive having sufficient disk space
          id: relocate-system-temp-dir
          run: |
            $ErrorActionPreference = "Stop"
            if (Test-Path -Path "D:\") {
              $newSystemTempDir = "D:\SystemTemp"
              New-Item -ItemType Directory -Path "${newSystemTempDir}" -Force
              $acl = New-Object System.Security.AccessControl.DirectorySecurity
              $acl.SetSecurityDescriptorSddlForm("O:SYG:SYD:PAI(A;OICI;FA;;;SY)(A;OICI;FA;;;BA)")
              Set-Acl "${newSystemTempDir}" -AclObject ${acl}
              [Environment]::SetEnvironmentVariable("SYSTEMTEMP", "${newSystemTempDir}", [EnvironmentVariableTarget]::Machine)
              Restart-Service docker
            } else {
              Write-Warning "Drive D doesn't exist, so there is no disk to relocate system temp directory"
            }
          shell: pwsh

        - name: Build the windows images
          id: build
          run: |
            docker build -t ${{ steps.meta.outputs.tags }} --build-arg WINDOWS_VERSION=ltsc${{ matrix.windows-base-version }} -f ./dockerfiles/Dockerfile.windows .

        - name: Sanity check it runs
          # We do this for a simple check of dependencies
          run: |
            docker run --rm -t ${{ steps.meta.outputs.tags }} --help
          shell: bash

